<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Responsive Site</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#050505;color:#fff;overflow-x:hidden}

header{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

header h1{color:#ff0000;font-size:20px}

nav{
  display:flex;
  gap:15px;
}

nav a{color:#fff;text-decoration:none;font-size:14px}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') center/cover;
}

.hero h2{
  font-size:clamp(28px,6vw,60px);
  font-weight:800;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{margin:15px 0;opacity:.7;font-size:clamp(14px,3vw,18px)}

.btn{
  padding:12px 25px;
  background:#ff0000;
  border:none;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}

.section{padding:80px 15px;text-align:center}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#0f0f0f;
  border-radius:15px;
  overflow:hidden;
  border:1px solid #ff0000;
}

.card img{width:100%;height:180px;object-fit:cover}
.card h3{color:#ff0000;margin:10px}
.card p{padding:0 10px 15px;font-size:14px;opacity:.7}

footer{
  background:#000;
  text-align:center;
  padding:20px;
}

/* MOBILE MENU */
.menu-btn{
  display:none;
  font-size:22px;
  cursor:pointer;
}

@media(max-width:768px){
  nav{
    position:absolute;
    top:60px;
    right:0;
    background:#000;
    flex-direction:column;
    width:200px;
    display:none;
    padding:15px;
  }

  nav.show{display:flex}

  .menu-btn{display:block}
}
</style>
</head>
<body>

<header>
<h1>🔥 UltraSite</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<nav id="menu">
<a href="#">Home</a>
<a href="#services">Xizmat</a>
<a href="#contact">Aloqa</a>
</nav>
</header>

<section class="hero">
<h2>Responsive Premium Site</h2>
<p>Telefon va kompyuter uchun ideal</p>
<button class="btn" onclick="scrollDown()">Boshlash</button>
</section>

<section id="services" class="section">
<h2>Xizmatlar</h2>
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1526378722484-cc5c5105b9b5">
<h3>Web</h3>
<p>Responsive saytlar</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<h3>Backend</h3>
<p>Kuchli tizim</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
<h3>Mobile</h3>
<p>Mobil mos dizayn</p>
</div>

</div>
</section>

<section id="contact" class="section">
<h2>Aloqa</h2>
<button class="btn" onclick="contact()">Bog'lanish</button>
</section>

<footer>
© 2026 Ultra Responsive
</footer>

<script>
function scrollDown(){
 document.getElementById('services').scrollIntoView({behavior:'smooth'});
}

function contact(){
 alert('Xabar yuborildi!');
}

function toggleMenu(){
 document.getElementById('menu').classList.toggle('show');
}
</script>

</body>
</html>
