<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Mening Rasmlar Saytim</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #FF0000, #0000FF);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: rgba(0, 0, 0, 0.5);
      font-size: 36px;
    }

    .banner {
      width: 100%;
      height: 300px;
      background-image: url('https://source.unsplash.com/1600x900/?nature');
      background-size: cover;
      background-position: center;
      margin-top: 20px;
    }

    .container {
      margin: 40px auto;
      max-width: 800px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      margin: 20px 0;
      padding: 20px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h2 {
      color: #FF0000;
    }

    .card p {
      color: #FFF;
    }
  </style>
</head>
<body>

  <header>Mening Rasmlar Saytim</header>

  <div class="banner"></div>

  <div class="container">
    <div class="card">
      <img src="https://source.unsplash.com/800x400/?city" alt="Shahar rasmi">
      <h2>Shahar</h2>
      <p>Bu shahar tasviri, chiroyli dizayn.</p>
    </div>
    <div class="card">
      <img src="https://source.unsplash.com/800x400/?mountain" alt="Tog' rasmi">
      <h2>Tog'lar</h2>
      <p>Bu tog' rasmi, tabiat go‘zalligi.</p>
    </div>
    <div class="card">
      <img src="https://source.unsplash.com/800x400/?beach" alt="Dengiz rasmi">
      <h2>Dengiz</h2>
      <p>Bu dengiz tasviri, tinchlik va dam olish.</p>
    </div>
  </div>

</body>
</html>
